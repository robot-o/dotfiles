- clean: ['~']

- defaults:
    shell:
        quiet: false
        stdin: true
        stdout: true
        stderr: true

- shell:
    -
        description: "BOOTSTRAP::installing yay.."
        command: [sudo pacman -S yay]
    -
        description: "BOOTSTRAP::upgrading system.."
        command: [yay -Syu]
    -
        description: "BOOTSTRAP::installing essentials.."
        command: [yay -S vim tmux direnv oh-my-bash-git firefox chromium visual-studio-code-bin nerd-fonts-complete]
    -
        description: "BOOTSTRAP::running oh-my-bash installer.."
        command: [bash -c /usr/share/oh-my-bash/tools/install.sh]
    -
        description: "BOOTSTRAP::installing devstuff.."
        command: [yay -S docker docker-compose docker-machine terraform ansible hcloud azure-cli]
    -
        description: "BOOTSTRAP::configuring devstuff.."
        command: [sudo groupmod -aG docker $USER && sudo systemctl enable --now docker]
    -
        description: "BOOTSTRAP::installing comms/entertainment.."
        command: [yay -S discord teams telegram-desktop spotify rambox-bin weechat nerd-fonts-complete vlc ffmpeg obs-studio]

- link:
    ~/.bash_profile: bash_profile
    ~/.bash_logout: bash_logout
    ~/.bash_env: bash_env
    ~/.bashrc: bashrc
    ~/.tmux.conf: tmux.conf
    ~/.vimrc: vimrc
    ~/.oh-my-bash/custom: oh-my-bash-custom
    ~/.config/yakuakerc: yakuakerc
    ~/.pam_environment: pam_environment
    ~/.config/i3: i3
    ~/.config/sway: sway
    ~/.config/rofi: rofi
    ~/.config/systemd/user/ssh-agent.service:
        create: true
        path: ssh-agent.service

- create:
    - ~/Projects
    - ~/data
    - ~/files
    - ~/programs

- shell:
    -
        command: systemctl enable --now --user ssh-agent
        description: "BOOTSTRAP:: enabling ssh agent systemd unit"